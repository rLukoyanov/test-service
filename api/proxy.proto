syntax = "proto3";

package api;

option go_package = "test-service/api";

message Target {
  string url = 1;
  string method = 2;
}

message Result {
  string url = 1;
  int32 status = 2;
  string body = 3;
  string error = 4;
}

message ProxyRequest {
  repeated Target downstream = 1;
  bytes payload = 2;
}

message ProxyResponse {
  string handler = 1;
  repeated Result results = 2;
}

service ProxyService {
  rpc CallOne(ProxyRequest) returns (ProxyResponse);
  rpc CallTwo(ProxyRequest) returns (ProxyResponse);
  rpc CallThree(ProxyRequest) returns (ProxyResponse);
  rpc CallFour(ProxyRequest) returns (ProxyResponse);
}
